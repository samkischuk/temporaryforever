<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary Forever</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <nav>
        <a href="/">Home</a>

        <div class="dropdown">
            <a href="/archive/">Archive</a>
            <div class="dropdown-content">
                <a href="/archive/">All Photographs</a>
            </div>
        </div>

        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
    </nav>

    <a href="/" class="logo-link">
        <img src="images/TFLogo.png"
             alt="Temporary Forever"
             class="logo">
    </a>

    <p class="tagline">
        a growing archive of anonymous photographs, negatives, and ephemera rescued from thrift stores, estate sales, flea markets, forgotten boxes, &amp; anywhere else history was nearly discarded.
    </p>

    <hr>

    <div class="slideshow">
        <a href="/archive/">
            <img id="slideshow-image"
                 src="images/PipeMan2.jpg"
                 alt="Archive Photograph"
                 class="photo">
        </a>
    </div>

    <div class="home-actions">

        <a href="/archive/" class="home-link">
            explore the archive →
        </a>

        <div class="or">or</div>

        <button class="home-link random-button" onclick="letPhotoChooseYou()">
            let the photograph choose you →
        </button>

    </div>

</div>

<script src="js/photos.js"></script>
<script src="js/slideshow.js"></script>
<script src="js/random.js"></script>

</body>

</html>
