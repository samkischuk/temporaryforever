<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary Forever</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <nav></nav>

    <a href="/" class="logo-link">
        <img src="/images/TFLogo.png"
             alt="Temporary Forever"
             class="logo">
    </a>

    <p class="tagline">
        a growing archive of anonymous photographs, negatives, & ephemera rescued from thrift stores, estate sales, flea markets, forgotten boxes, &amp; anywhere else history was nearly discarded.
    </p>

    <hr>

    <div class="slideshow">
        <a href="/archive/">
            <img id="slideshow-image"
                 src="/images/PipeMan2.jpg"
                 alt="Archive Photograph"
                 class="photo">
        </a>
    </div>

    <div class="home-actions">
        <a href="/archive/" class="home-link">explore the photo archive →</a>

        <div class="or">or</div>

        <button class="home-link random-button" onclick="letPhotoChooseYou()">
            let the photo choose you →
        </button>
    </div>

</div>

<script src="/js/nav.js"></script>
<script src="/js/photos.js"></script>
<script src="/js/slideshow.js"></script>
<script src="/js/random.js"></script>

</body>

</html>
