<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Photographs | Temporary Forever</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <nav>
        <a href="index.html">Home</a>

        <div class="dropdown">
            <a href="archive.html">Archive</a>
            <div class="dropdown-content">
                <a href="archive.html">All Photographs</a>
            </div>
        </div>

        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <img src="images/tflogo.png" alt="Temporary Forever" class="logo">

    <h2 class="archive-heading">All Photographs</h2>

    <div class="gallery">
        <img src="images/easterchildren.jpg" alt="Vintage Easter Photograph" class="thumbnail" onclick="openLightbox(this.src)">
    </div>

</div>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Expanded photograph">
</div>

<script>
    function openLightbox(imageSrc) {
        document.getElementById("lightbox-img").src = imageSrc;
        document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
    }
</script>

</body>

</html>
