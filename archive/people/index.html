<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People | Temporary Forever</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <nav></nav>

    <a href="/" class="logo-link">
        <img src="/images/TFLogo.png"
             alt="Temporary Forever"
             class="logo">
    </a>
<h2 class="archive-title">people</h2>

<p class="archive-subtitle">
    portraits, families, strangers, celebrations, & everyday moments.
</p>
    <div class="gallery" id="gallery"></div>

</div>

<div id="lightbox">

    <button class="close-btn" onclick="closeLightbox()">×</button>

    <button class="arrow left" onclick="previousImage(event)">❮</button>

    <img id="lightbox-img"
         src=""
         alt="Expanded Photograph">

    <button class="arrow right" onclick="nextImage(event)">❯</button>

</div>

<script src="/js/nav.js"></script>
<script src="/js/photos.js"></script>

<script>
const originalPhotos = photos;
const peoplePhotos = originalPhotos.filter(photo => photo.category === "people");
photos.length = 0;
peoplePhotos.forEach(photo => photos.push(photo));
</script>

<script src="/js/archive.js"></script>

</body>
</html>
