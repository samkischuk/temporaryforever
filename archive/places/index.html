<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Places | Temporary Forever</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <nav></nav>

    <a href="/" class="logo-link">
        <img src="/images/TFLogo.png"
             alt="Temporary Forever"
             class="logo">
    </a>

    <h2 class="archive-title">places</h2>

    <p class="archive-subtitle">
        buildings, landscapes, streets, & places remembered through photographs.
    </p>

    <div id="gallery" class="gallery"></div>

</div>

<div id="lightbox">

    <button class="close-btn" onclick="closeLightbox()">×</button>

    <button class="arrow left" onclick="previousImage(event)">❮</button>

    <img id="lightbox-img"
         src=""
         alt="Expanded Photograph">

    <button class="arrow right" onclick="nextImage(event)">❯</button>

</div>

<script src="/js/nav.js"></script>
<script src="/js/photos.js"></script>

<script>
    const placePhotos = photos.filter(photo => photo.category === "places");

    photos.length = 0;
    placePhotos.forEach(photo => photos.push(photo));
</script>

<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

<script src="/js/archive.js"></script>

</body>
</html>
