<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matchbooks | Temporary Forever</title>

    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <nav></nav>

    <a href="/" class="logo-link">
        <img src="/images/TFLogo.png"
             alt="Temporary Forever"
             class="logo">
    </a>

    <h2 class="archive-title">matchbooks</h2>

    <p class="archive-subtitle">
        small advertisements carried in pockets, left on bar tops, & forgotten in kitchen drawers.
    </p>

    <div class="matchbook-gallery" id="paper-gallery"></div>

</div>

<div id="lightbox">

    <button class="close-btn" onclick="closeLightbox()">×</button>

    <button class="arrow left" onclick="previousImage(event)">❮</button>

    <div class="lightbox-image-wrap">
        <img id="lightbox-img"
             src=""
             alt="Expanded Matchbook">

        <div id="lightbox-flip-text"></div>
    </div>

    <button class="arrow right" onclick="nextImage(event)">❯</button>

</div>

<script src="/js/paper-archive.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/paper.js"></script>

</body>
</html>
