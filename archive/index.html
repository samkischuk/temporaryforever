<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Photographs | Temporary Forever</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <nav>

        <a href="/">Home</a>

        <div class="dropdown">

            <a href="/archive/">Archive</a>

            <div class="dropdown-content">
                <a href="/archive/">All Photographs</a>
            </div>

        </div>

        <a href="/about/">About</a>

        <a href="/contact/">Contact</a>

    </nav>

    <a href="/" class="logo-link">
        <img src="/images/TFLogo.png"
             alt="Temporary Forever"
             class="logo">
    </a>

    <div class="gallery" id="gallery"></div>

</div>

<!-- Lightbox -->

<div id="lightbox">

    <button class="close-btn" onclick="closeLightbox()">×</button>

    <button class="arrow left" onclick="previousImage(event)">❮</button>

    <img id="lightbox-img"
         src=""
         alt="Expanded Photograph">

    <button class="arrow right" onclick="nextImage(event)">❯</button>

</div>

<script src="/js/photos.js"></script>
<script src="/js/archive.js"></script>

</body>

</html>
