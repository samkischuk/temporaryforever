<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals | Temporary Forever</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="container">

    <nav></nav>

    <a href="/" class="logo-link">
        <img src="/images/TFLogo.png"
             alt="Temporary Forever"
             class="logo">
    </a>
    <h2 class="archive-title">Animals</h2>

<p class="archive-subtitle">
    companions, wildlife, & every creature that found its way into the archive.
</p>

    <div class="gallery" id="gallery"></div>

</div>

<div id="lightbox">

    <button class="close-btn" onclick="closeLightbox()">×</button>

    <button class="arrow left" onclick="previousImage(event)">❮</button>

    <img id="lightbox-img"
         src=""
         alt="Expanded Photograph">

    <button class="arrow right" onclick="nextImage(event)">❯</button>

</div>

<script src="/js/nav.js"></script>
<script src="/js/photos.js"></script>

<script>
const animalPhotos = photos.filter(photo => photo.category === "animals");

photos.length = 0;
animalPhotos.forEach(photo => photos.push(photo));
</script>

<script src="/js/archive.js"></script>

</body>
</html>
